<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LEVRAM — Export Studio</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="render-queue.css" />
  <style>
    .ex-page      { padding: 22px; min-height: 100vh; }
    .ex-header    { display: flex; align-items: center; gap: 18px; padding: 14px 16px; border: 1px solid rgba(201,168,76,.22); background: rgba(0,0,0,.75); margin-bottom: 14px; }
    .ex-title     { color: #C9A84C; font-size: 21px; letter-spacing: 4px; text-transform: uppercase; }
    .ex-sub       { color: #8d7a55; font-size: 16px; margin-top: 4px; }
    .ex-back      { border: 1px solid rgba(201,168,76,.35); background: #0a0918; color: #C9A84C; padding: 8px 12px; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
    .ex-grid      { display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: start; }
    .ex-panel     { border: 1px solid rgba(201,168,76,.18); background: rgba(0,0,0,.6); padding: 16px; border-radius: 4px; }
    .ex-label     { font-size: 15px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim, #666); margin-bottom: 6px; }
    .ex-input     { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 7px 10px; border-radius: 3px; font-size: 18px; box-sizing: border-box; }
    .ex-btn       { border: 1px solid rgba(201,168,76,.55); background: #0a0918; color: #C9A84C; padding: 9px 18px; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 10px; border-radius: 2px; }
    .ex-btn:hover { background: rgba(201,168,76,.14); color: #f9f295; }
    .ex-btn:disabled { opacity: .4; cursor: not-allowed; }
    .ex-clip-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; max-height: 260px; overflow-y: auto; }
    .ex-clip-row  { display: flex; align-items: center; gap: 10px; padding: 7px 10px; background: rgba(0,0,0,.35); border: 1px solid rgba(201,168,76,.1); border-radius: 3px; }
    .ex-clip-name { flex: 1; font-size: 16px; color: var(--text-muted, #aaa); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ex-clip-check{ accent-color: #C9A84C; width: 14px; height: 14px; }
    .ex-status    { font-size: 17px; color: #C9A84C; margin-top: 10px; min-height: 20px; }
    .vlib-grid    { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 14px; }
    .vlib-card    { background: rgba(0,0,0,.45); border: 1px solid rgba(201,168,76,.15); border-radius: 6px; overflow: hidden; }
    .vlib-card video{ width: 100%; display: block; max-height: 200px; background: #000; }
    .vlib-card-meta { padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; }
    .vlib-name    { font-size: 15px; color: var(--text-dim, #666); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
    .vlib-dl      { font-size: 15px; letter-spacing: 2px; text-transform: uppercase; color: #C9A84C; text-decoration: none; border: 1px solid rgba(201,168,76,.3); padding: 3px 9px; border-radius: 2px; }
    .vlib-dl:hover{ background: rgba(201,168,76,.1); }
    .vlib-empty   { color: var(--text-dim, #666); font-size: 16px; letter-spacing: 2px; text-transform: uppercase; padding: 20px 0; }
  </style>
  <script src="config.js"></script>
  <script src="themes.js"></script>
</head>
<body>
<div class="ex-page">

  <div class="ex-header">
    <button class="ex-back" onclick="window.location.href='index.html'">← LEVRAM</button>
    <div>
      <div class="ex-title">Export Studio</div>
      <div class="ex-sub">Episode assembly, video library, and download management.</div>
    </div>
    <span id="ex-lib-count" style="margin-left:auto;border:1px solid rgba(201,168,76,.35);background:#0a0918;color:#C9A84C;padding:8px 12px;font-size: 16px;letter-spacing:2px;text-transform:uppercase;">Loading...</span>
  </div>

  <div class="ex-grid">

    <!-- LEFT: Episode Assembler -->
    <div>
      <div class="ex-panel">
        <div class="ex-title" style="font-size: 18px;margin-bottom:12px;">Episode Assembler</div>

        <div class="ex-label">Episode Title</div>
        <input id="ep-title" class="ex-input" type="text" placeholder="Episode 1 — The Runner" />

        <div class="ex-label" style="margin-top:14px;">Select Clips (in order)</div>
        <div id="ep-clip-list" class="ex-clip-list">
          <div class="vlib-empty">Loading clips…</div>
        </div>

        <button id="ep-assemble-btn" class="ex-btn" onclick="assembleEpisode()">Export Episode</button>
        <div id="ep-status" class="ex-status"></div>
      </div>

      <div class="ex-panel" style="margin-top:14px;">
        <div class="ex-title" style="font-size: 18px;margin-bottom:12px;">Quick Wan2.1 Video</div>
        <div class="ex-label">Prompt</div>
        <textarea id="wan-prompt" class="ex-input" style="height:80px;resize:none;" placeholder="Describe the scene for Wan2.1 T2V..."></textarea>
        <div class="ex-label" style="margin-top:8px;">Aspect Ratio</div>
        <select id="wan-aspect" class="ex-input">
          <option value="widescreen">Widescreen 16:9</option>
          <option value="portrait">Portrait 9:16</option>
          <option value="square">Square 1:1</option>
        </select>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <div style="flex:1;">
            <div class="ex-label">Steps</div>
            <input type="range" id="wan-steps" min="10" max="50" value="25" oninput="document.getElementById('wan-steps-val').textContent=this.value" style="width:100%;" />
            <span id="wan-steps-val" style="font-size: 16px;color:var(--text-dim,#666);">25</span>
          </div>
          <div style="flex:1;">
            <div class="ex-label">Seed (blank=random)</div>
            <input type="number" id="wan-seed" class="ex-input" placeholder="Random" style="height:auto;padding:5px;" />
          </div>
        </div>
        <button id="wan-generate-btn" class="ex-btn" onclick="generateWanVideo()">Generate Wan Video</button>
        <div id="wan-status" class="ex-status"></div>
        <video id="wan-result-player" controls style="width:100%;display:none;margin-top:10px;border-radius:4px;background:#000;max-height:180px;"></video>
      </div>
    </div>

    <!-- RIGHT: Video Library -->
    <div class="ex-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div class="ex-title" style="font-size: 18px;">Video Library</div>
        <button onclick="loadVideoLibrary()" style="background:transparent;border:1px solid rgba(201,168,76,.25);color:#C9A84C;font-size: 15px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;cursor:pointer;border-radius:2px;">Refresh</button>
      </div>
      <div id="vlib-grid" class="vlib-grid">
        <div class="vlib-empty">Loading…</div>
      </div>
    </div>

  </div>
</div>

<script>
const BASE = window.LEVRAM_CONFIG?.api || "http://127.0.0.1:8000";
let allVideos   = [];
let queueItems  = [];

// ─── Load video library ─────────────────────────────────────
async function loadVideoLibrary() {
  const grid    = document.getElementById("vlib-grid");
  const counter = document.getElementById("ex-lib-count");
  try {
    const res  = await levFetch(`${BASE}/video/library`);
    const data = await res.json();
    allVideos  = data.videos || [];

    if (counter) counter.textContent = `${allVideos.length} Video${allVideos.length !== 1 ? "s" : ""}`;

    if (!allVideos.length) {
      grid.innerHTML = `<div class="vlib-empty">No videos yet — render clips or generate Wan2.1 videos.</div>`;
      return;
    }

    grid.innerHTML = allVideos.map(v => `
      <div class="vlib-card">
        <video src="${BASE + v.url}" controls preload="metadata"></video>
        <div class="vlib-card-meta">
          <div>
            <div class="vlib-name" title="${v.name}">${v.name}</div>
            <div style="font-size: 14px;color:#555;margin-top:2px;">${v.created} · ${v.size_mb} MB</div>
          </div>
          <a class="vlib-dl" href="${BASE + v.url}" download="${v.name}">DL</a>
        </div>
      </div>
    `).join("");
  } catch (err) {
    console.error("VIDEO LIBRARY ERROR:", err);
    if (grid) grid.innerHTML = `<div class="vlib-empty">Could not load videos.</div>`;
  }
}

// ─── Load render queue clips for episode assembler ──────────
async function loadQueueClips() {
  const list = document.getElementById("ep-clip-list");
  try {
    const res  = await levFetch(`${BASE}/render-queue`);
    const data = await res.json();
    queueItems = (data.queue || []).filter(i => i.clipUrl);

    if (!queueItems.length) {
      list.innerHTML = `<div class="vlib-empty">No rendered clips yet. Use Render Queue → Render Clip on each shot.</div>`;
      return;
    }

    list.innerHTML = queueItems.map((item, i) => {
      const label = item.shot?.shot_number || item.shot_number || item.id?.slice(0, 8) || `Clip ${i + 1}`;
      return `
        <div class="ex-clip-row">
          <input type="checkbox" class="ex-clip-check" id="ep-clip-${item.id}" value="${item.id}" checked />
          <label for="ep-clip-${item.id}" class="ex-clip-name" title="${item.clipUrl}">${label}</label>
          <span style="font-size: 14px;color:#555;">${item.clipUrl.split("/").pop()}</span>
        </div>
      `;
    }).join("");
  } catch (err) {
    console.error("LOAD QUEUE CLIPS ERROR:", err);
    if (list) list.innerHTML = `<div class="vlib-empty">Could not load clips.</div>`;
  }
}

// ─── Assemble episode ───────────────────────────────────────
async function assembleEpisode() {
  const title   = document.getElementById("ep-title")?.value.trim() || "episode";
  const statusEl = document.getElementById("ep-status");
  const btn     = document.getElementById("ep-assemble-btn");

  const checked = [...document.querySelectorAll(".ex-clip-check:checked")].map(cb => cb.value);
  if (!checked.length) {
    if (statusEl) statusEl.textContent = "Check at least one clip.";
    return;
  }

  if (btn) { btn.disabled = true; btn.textContent = "Assembling…"; }
  if (statusEl) statusEl.textContent = "Running ffmpeg concat…";

  try {
    const res = await levFetch(`${BASE}/video/assemble-episode`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ item_ids: checked, title }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.detail || "Assembly failed");

    const episodeUrl = BASE + data.episodeUrl;
    if (statusEl) statusEl.innerHTML = `
      <span style="color:#4caf50;">✓ Episode ready (${data.clips} clips)</span><br>
      <a href="${episodeUrl}" download style="color:#C9A84C;font-size: 16px;letter-spacing:2px;">Download ${data.episodeUrl.split("/").pop()}</a>
    `;
    await loadVideoLibrary();
  } catch (err) {
    console.error("ASSEMBLE EPISODE ERROR:", err);
    if (statusEl) statusEl.textContent = "Error: " + err.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "Export Episode"; }
  }
}

// ─── Quick Wan2.1 video ──────────────────────────────────────
async function generateWanVideo() {
  const prompt   = document.getElementById("wan-prompt")?.value.trim() || "";
  const aspect   = document.getElementById("wan-aspect")?.value || "widescreen";
  const steps    = parseInt(document.getElementById("wan-steps")?.value || "25");
  const seedRaw  = document.getElementById("wan-seed")?.value.trim();
  const seed     = seedRaw ? parseInt(seedRaw) : null;
  const statusEl = document.getElementById("wan-status");
  const btn      = document.getElementById("wan-generate-btn");
  const player   = document.getElementById("wan-result-player");

  if (!prompt) {
    if (statusEl) statusEl.textContent = "Enter a prompt first.";
    return;
  }

  if (btn) { btn.disabled = true; btn.textContent = "Generating… (up to 12 min)"; }
  if (statusEl) statusEl.textContent = "Submitting to Wan2.1 via ComfyUI…";
  if (player) player.style.display = "none";

  try {
    const res = await levFetch(`${BASE}/video/generate-wan`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, aspect, steps, seed }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.detail || "Video generation failed");

    const videoUrl = BASE + data.outputUrl;
    if (statusEl) statusEl.innerHTML = `<span style="color:#4caf50;">✓ Done — ${data.frames} frames @ ${data.fps}fps</span>`;
    if (player) { player.src = videoUrl; player.style.display = "block"; }
    await loadVideoLibrary();
  } catch (err) {
    console.error("WAN VIDEO ERROR:", err);
    if (statusEl) statusEl.textContent = "Error: " + err.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "Generate Wan Video"; }
  }
}

// ─── Init ───────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  loadVideoLibrary();
  loadQueueClips();
});

window.assembleEpisode  = assembleEpisode;
window.generateWanVideo = generateWanVideo;
window.loadVideoLibrary = loadVideoLibrary;
</script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEVRAM Generator</title>
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="project-battery.css" />
    <link rel="stylesheet" href="character-lab.css" />
    <script src="config.js"></script>
    <script src="themes.js"></script>
  </head>
  <body>
    <!-- TOP BAR -->
    <header class="top-bar">
      <div class="logo">
        <span class="logo-text">LEVRAM</span>
        <span class="logo-sub">Studio OS</span>
      </div>
      <nav class="top-nav">
        <button class="nav-btn active" data-tab="dashboard">Studio</button>
        <button class="nav-btn" data-tab="idea-vault">Project</button>
        <button class="nav-btn" data-tab="storyboard">Storyboard ↗</button>
        <button class="nav-btn" data-tab="characters">Cast</button>
        <button class="nav-btn" onclick="window.open('location-lab.html','_blank')">Locations ↗</button>
        <button class="nav-btn" data-tab="shot-builder">Shot Builder</button>
        <button class="nav-btn" data-tab="image-gen">Generate</button>
        <button class="nav-btn" data-tab="music">Music</button>
        <button class="nav-btn" data-tab="timeline">Timeline ↗</button>
        <button class="nav-btn" onclick="window.open('render-queue.html','_blank')">Render ↗</button>
        <button class="nav-btn" data-tab="export">Export ↗</button>
        <button class="nav-btn" data-tab="projects">Projects</button>
        <button class="nav-btn" data-tab="settings">Settings</button>
        <button class="nav-btn" onclick="window.open('manual.html','_blank')">Manual ↗</button>
        <button id="theme-toggle" class="nav-btn">Ivory Mode</button>
        <button id="rl-toggle-btn" class="nav-btn rl-nav-btn" onclick="RL.toggle()">🔴 Redlight</button>
        <button id="bc-toggle-btn" class="nav-btn bc-toggle-btn" onclick="BC.toggle()">
          <span id="backend-status-dot" class="bc-live-dot"></span> Console
          <span id="bc-badge" data-n="0" style="display:none;align-items:center;justify-content:center;background:#e74c3c;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;margin-left:4px;"></span>
        </button>
      </nav>
    </header>

    <!-- MAIN GRID -->
    <div class="main-grid">
      <!-- ROW 1 — Project Battery -->
      <div id="project-battery-host" style="grid-column:1/-1;grid-row:1"></div>

      <!-- TAB containers — panels injected by panel scripts below -->
      <div id="tab-dashboard" class="tab-panel db-root" style="grid-column:1/-1;grid-row:2/-1;display:flex;min-height:calc(100vh - 120px);"></div>
      <div id="tab-main" class="tab-panel" style="grid-column:1/-1;grid-row:2;display:none;grid-template-columns:1fr 1fr;gap:12px;"></div>
      <div id="tab-idea-vault" class="tab-panel" style="grid-column:1/-1;grid-row:2;display:none;flex-direction:row;gap:12px;align-items:flex-start;"></div>
      <div id="tab-image-gen" class="tab-panel" style="grid-column:1/-1;grid-row:2;display:none;flex-direction:row;gap:12px;"></div>
      <div id="tab-music" class="tab-panel" style="grid-column:1/-1;grid-row:2;display:none;flex-direction:row;gap:12px;align-items:flex-start;overflow-y:auto;"></div>

      <!-- ROW 3 — Workspace Tab Bar -->
      <div class="workspace-tabs-bar" style="grid-column:1/-1;grid-row:3">
        <button class="workspace-tab-btn active" data-ws="preview">&#9654; &nbsp;Preview</button>
        <button class="workspace-tab-btn" type="button" onclick="window.open('timeline.html','_blank')">&#9776; &nbsp;Timeline ↗</button>
      </div>

      <!-- ROW 4 — Workspace panels (content injected by workspace-panel.js) -->
      <div id="ws-preview" class="workspace-panel" style="grid-column:1/-1;grid-row:4"></div>
      <div id="ws-timeline" class="workspace-panel" style="grid-column:1/-1;grid-row:4;display:none"></div>
      <div id="ws-character" class="workspace-panel" style="grid-column:1/-1;grid-row:4;display:none;min-height:400px;overflow:hidden;"></div>
    </div>

    <div class="bottom-bar"></div>

    <!-- Panel injectors — run synchronously so DOM is ready before feature scripts -->
    <script src="panels/dashboard-panel.js"></script>
    <script src="panels/main-panel.js"></script>
    <script src="panels/idea-vault-panel.js"></script>
    <script src="panels/image-gen-panel.js"></script>
    <script src="panels/music-panel.js"></script>
    <script src="panels/workspace-panel.js"></script>
    <script src="panels/modals-panel.js"></script>

    <!-- Feature scripts -->
    <script src="app.js"></script>
    <script src="backend-console.js"></script>
    <script src="project-battery.js"></script>
    <script src="shot-builder.js"></script>
    <script src="voice-lab.js"></script>
    <script src="character-lab.js"></script>
    <script src="timeline.js"></script>
    <script src="preview-drawer.js"></script>
    <script src="tabs.js"></script>
    <script src="dashboard.js"></script>
    <script src="idea-vault.js"></script>
    <script src="image-gen.js"></script>
    <script src="orchestrate.js"></script>
    <script src="redlight.js"></script>
    <script src="rl-agent.js"></script>
    <script src="kel-e.js"></script>
  </body>
</html>

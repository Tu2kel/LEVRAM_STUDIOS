<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LEVRAM Render Queue</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="render-queue.css" />
</head>
<body>
  <div class="rq-page">
    <div class="rq-page-header">
      <button class="rq-back" onclick="window.location.href='index.html'">← Return to LEVRAM</button>
      <div>
        <div class="rq-page-title">🎬 Full Render Queue</div>
        <div class="rq-page-subtitle">Render management, prompt debugging, and output review.</div>
      </div>
      <span id="rq-count" class="rq-page-count">Loading...</span>
    </div>

    <div class="rq-export-bar">
      <input id="ep-title-input" type="text" placeholder="Episode title" style="background:#1a1a1a;border:1px solid #333;color:#fff;padding:6px 10px;border-radius:4px;font-size:12px;width:180px;" />
      <button id="export-episode-btn" class="rq-export-btn" onclick="assembleEpisode()">Export Episode</button>
      <span id="ep-status" style="font-size:12px;color:var(--text-dim);margin-left:12px;"></span>
    </div>

    <div id="render-queue-panel" class="rq-page-panel"></div>
  </div>

  <script>
    const BASE = "http://127.0.0.1:8000";
    let renderQueue = [];
    window.renderQueue = renderQueue;
    function setStatus(){}
  </script>

  <script src="render-queue.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      if (typeof loadRenderQueue === "function") loadRenderQueue();
    });
  </script>
</body>
</html>

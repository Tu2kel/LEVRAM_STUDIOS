<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LEVRAM Character Lab</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="character-lab.css" />
</head>
<body>
  <main class="character-lab-page">
    <header class="character-lab-page-header">
      <div>
        <h1>CHARACTER LAB</h1>
        <p>Reusable cast profiles</p>
      </div>
      <button onclick="window.close()">CLOSE TAB</button>
    </header>

    <section id="character-lab-content" class="character-lab-shell">
      <div id="character-lab-status" class="character-lab-status" style="display:none;"></div>

      <div class="character-lab-grid">
        <div class="character-form">
          <input id="character-name" placeholder="Character Name" />
          <input id="character-gender" placeholder="Gender" />
          <input id="character-age" placeholder="Age" />
          <textarea id="character-appearance" placeholder="Appearance"></textarea>
          <textarea id="character-wardrobe" placeholder="Wardrobe"></textarea>
          <textarea id="character-voice" placeholder="Voice Description"></textarea>

          <div class="field-label" style="margin-top: 8px;">Default Voice Profile</div>
          <select id="character-default-voice">
            <option value="">No Default Voice</option>
          </select>
          <div class="field-hint">Used when this character is assigned to generated dialogue.</div>
          <textarea id="character-personality" placeholder="Personality"></textarea>
          <textarea id="character-notes" placeholder="Notes"></textarea>
          
<div class="character-action-row">
  <button id="save-character-btn" type="button" onclick="saveCharacter()">Save Character</button>
  <button id="clear-character-btn" type="button" onclick="clearCharacterForm()">Clear Form</button>
</div>

        </div>

        <div class="character-list-wrap">
          <div class="character-preview-box">
            <div class="character-list-title">Character Visual Test</div>
            <button id="generate-character-preview-btn" type="button" onclick="generateCharacterPreview()">Generate Character Preview</button>
            <textarea id="character-preview-prompt" placeholder="Generated character image prompt will appear here..."></textarea>
            <div id="character-preview-status" class="character-preview-status"></div>
            <img id="character-preview-img" class="character-preview-img" alt="Character preview" style="display:none;" />
          </div>

          <div class="character-list-title saved-title">Saved Characters</div>
          <div id="character-list" class="character-list"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="character-lab.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LEVRAM Timeline</title>
  <link rel="stylesheet" href="app.css" />
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #111228;
    }
    .tl-page { display: flex; flex-direction: column; height: 100%; }

    /* ── Header ── */
    .tl-header-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 28px;
      background: linear-gradient(90deg, #09080f 0%, #141430 100%);
      border-bottom: 2px solid rgba(201, 168, 76, 0.35);
      flex-shrink: 0;
    }
    .tl-logo {
      font-family: Rajdhani, sans-serif;
      font-size: 27px;
      font-weight: 700;
      letter-spacing: 7px;
      background: linear-gradient(90deg, #8b6914, #c9a84c, #f5d98b, #c9a84c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tl-subtitle {
      font-size: 15px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .tl-header-actions { margin-left: auto; display: flex; gap: 8px; }
    .tl-header-actions button {
      background: transparent;
      border: 1px solid rgba(201, 168, 76, 0.25);
      color: var(--text-muted);
      font-family: Rajdhani, sans-serif;
      font-size: 17px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .tl-header-actions button.gold {
      color: var(--gold);
      border-color: rgba(201, 168, 76, 0.5);
    }
    .tl-header-actions button:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── Status bar ── */
    .tl-status-bar {
      padding: 5px 28px;
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(201, 168, 76, 0.55);
      background: #0d0c1e;
      border-bottom: 1px solid rgba(201, 168, 76, 0.06);
      flex-shrink: 0;
    }

    /* ── Timeline ruler + tracks ── */
    .tl-tracks-section {
      background: #141430;
      border-bottom: 1px solid rgba(201, 168, 76, 0.12);
      flex-shrink: 0;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .tl-tracks-section::-webkit-scrollbar { height: 4px; }
    .tl-tracks-section::-webkit-scrollbar-thumb { background: rgba(201,168,76,.2); border-radius: 2px; }

    .tl-ruler-row {
      display: flex;
      align-items: flex-end;
      padding: 6px 10px 0 72px;
      position: relative;
      min-width: 600px;
    }
    .tl-ruler-tick {
      position: absolute;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .tl-ruler-tick-line {
      width: 1px;
      background: rgba(201,168,76,.2);
      height: 8px;
    }
    .tl-ruler-tick-label {
      font-size: 14px;
      letter-spacing: 1px;
      color: rgba(201,168,76,.4);
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .tl-tracks-bar {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 10px 8px;
      min-width: 600px;
    }
    .tl-track { display: flex; align-items: center; gap: 10px; height: 28px; }
    .tl-track-label {
      font-family: Rajdhani, sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(201, 168, 76, 0.35);
      width: 54px;
      flex-shrink: 0;
      text-align: right;
    }
    .tl-track-body {
      flex: 1;
      height: 100%;
      position: relative;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(201, 168, 76, 0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .tl-clip {
      position: absolute;
      top: 2px; bottom: 2px;
      border-radius: 2px;
      display: flex; align-items: center;
      padding: 0 5px;
      font-size: 14px; letter-spacing: 1px;
      white-space: nowrap; overflow: hidden;
      transition: opacity .1s;
    }
    .tl-clip:hover { filter: brightness(1.2); }
    .clip-video { background: rgba(156,39,176,.35); border: 1px solid rgba(156,39,176,.5); color: #ce93d8; }
    .clip-audio { background: rgba(76,175,80,.3);  border: 1px solid rgba(76,175,80,.5);  color: #a5d6a7; }
    .clip-music { background: rgba(255,152,0,.2);  border: 1px solid rgba(255,152,0,.4);  color: #ffcc80; }

    /* ── Shot list scroll area ── */
    .tl-shots-list {
      flex: 1;
      overflow-y: auto;
      padding: 18px 28px 48px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0e0d20;
    }
    .tl-shots-list::-webkit-scrollbar { width: 4px; }
    .tl-shots-list::-webkit-scrollbar-track { background: transparent; }
    .tl-shots-list::-webkit-scrollbar-thumb { background: rgba(201, 168, 76, 0.2); border-radius: 2px; }

    /* ── Drag states ── */
    .tl-shot-card.dragging {
      opacity: 0.55 !important;
      transform: scale(0.985) !important;
      box-shadow: 0 0 18px rgba(201, 168, 76, 0.45) !important;
      border: 1px solid var(--gold) !important;
    }
    .tl-shot-card.drop-target {
      border: 1px dashed var(--gold) !important;
      box-shadow: inset 0 0 18px rgba(201, 168, 76, 0.25) !important;
      position: relative;
    }
    .tl-shot-card.drop-target::before {
      content: "DROP HERE";
      position: absolute;
      top: -10px;
      left: 14px;
      background: #141430;
      color: var(--gold);
      font-size: 15px;
      letter-spacing: 2px;
      padding: 1px 6px;
    }
  </style>
  <script src="config.js"></script>
  <script src="themes.js"></script>
</head>
<body>
  <div class="tl-page">

    <div class="tl-header-bar">
      <div>
        <div class="tl-logo">LEVRAM</div>
        <div class="tl-subtitle">Shot Timeline</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-left:18px;">
        <span style="font-family:Rajdhani,sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,0.5);">Project</span>
        <select id="tl-project-sel" style="background:#0d0c1e;border:1px solid rgba(201,168,76,0.3);color:var(--gold);font-family:Rajdhani,sans-serif;font-size:15px;letter-spacing:1px;padding:4px 10px;border-radius:3px;cursor:pointer;min-width:160px;">
          <option value="">All Projects</option>
        </select>
      </div>
      <div class="tl-header-actions">
        <button onclick="shots.reverse(); renumberShots(); renderTimeline(); setStatus('Order reversed — click Save Order to keep.')">⇅ Reverse</button>
        <button class="gold" onclick="saveTimelineOrder()">Save Order</button>
        <button class="gold" onclick="exportTimeline()">⬇ Export Video</button>
        <button onclick="eraseTimeline()" style="color:#ff4444;border-color:rgba(255,68,68,0.4);">🗑 Erase All</button>
        <button onclick="window.close()">Close</button>
      </div>
    </div>

    <div class="tl-status-bar" id="tl-status">Loading shots...</div>

    <!-- Live orchestrator banner -->
    <div id="tl-live-banner" style="display:none;align-items:center;gap:10px;padding:6px 16px;background:rgba(201,168,76,0.08);border-bottom:1px solid rgba(201,168,76,0.2);font-family:Rajdhani,sans-serif;"></div>

    <!-- Time ruler + multi-track view -->
    <div class="tl-tracks-section" id="tl-tracks-section">
      <div class="tl-ruler-row" id="tl-ruler"></div>
      <div class="tl-tracks-bar" id="tl-tracks-bar">
        <div class="tl-track">
          <span class="tl-track-label">Video</span>
          <div class="tl-track-body" id="track-video"></div>
        </div>
        <div class="tl-track">
          <span class="tl-track-label">Voice</span>
          <div class="tl-track-body" id="track-audio"></div>
        </div>
        <div class="tl-track">
          <span class="tl-track-label">Music</span>
          <div class="tl-track-body" id="track-music"></div>
        </div>
      </div>
    </div>

    <div class="tl-shots-list" id="timeline-shots"></div>

  </div>

  <script>
    const BASE = window.LEVRAM_CONFIG?.api || "http://localhost:8000";
    const _urlParams     = new URLSearchParams(window.location.search);
    let _activeProject   = _urlParams.get("project") || "";
    let shots = [];
    let draggedShotId = null;

    const shotsList  = document.getElementById("timeline-shots");
    const statusEl   = document.getElementById("tl-status");
    const projSel    = document.getElementById("tl-project-sel");

    // Populate project dropdown from all scenes, then load filtered view
    async function initProjectFilter() {
      try {
        const res  = await levFetch(`${BASE}/scenes`);
        const data = await res.json();
        const allScenes = data.scenes || [];
        const projects  = [...new Set(allScenes.map(s => (s.project || s.saga || "").trim()).filter(Boolean))].sort();
        projects.forEach(p => {
          const o = document.createElement("option");
          o.value = p; o.textContent = p;
          projSel.appendChild(o);
        });
        if (_activeProject) projSel.value = _activeProject;
        const sub = document.querySelector(".tl-subtitle");
        if (sub) sub.textContent = _activeProject ? _activeProject.toUpperCase() : "Shot Timeline";
      } catch (_) {}
      loadScenes();
    }

    projSel.addEventListener("change", () => {
      _activeProject = projSel.value;
      const sub = document.querySelector(".tl-subtitle");
      if (sub) sub.textContent = _activeProject ? _activeProject.toUpperCase() : "Shot Timeline";
      loadScenes();
    });

    function setStatus(msg, isErr = false) {
      statusEl.style.color = isErr ? "var(--imperial-red)" : "var(--text-dim)";
      statusEl.textContent = msg;
    }

    function getShotNumber(index) {
      return `SC-${String(index + 1).padStart(3, "0")}`;
    }

    function renumberShots() {
      shots = shots.map((shot, i) => ({ ...shot, shot_number: getShotNumber(i) }));
    }

    function moveShot(id, direction) {
      const index = shots.findIndex(s => s.id === id);
      if (index === -1) return;
      const newIndex = index + direction;
      if (newIndex < 0 || newIndex >= shots.length) return;
      [shots[index], shots[newIndex]] = [shots[newIndex], shots[index]];
      renumberShots();
      renderTimeline();
    }

    function handleDragStart(e, id) {
      draggedShotId = id;
      e.currentTarget.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    }

    function handleDragEnd(e) {
      e.currentTarget.classList.remove("dragging");
      document.querySelectorAll(".drop-target").forEach(el => el.classList.remove("drop-target"));
      draggedShotId = null;
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add("drop-target");
    }

    function handleDragLeave(e) {
      e.currentTarget.classList.remove("drop-target");
    }

    function handleDrop(e, targetId) {
      e.preventDefault();
      if (!draggedShotId || draggedShotId === targetId) return;
      const fromIdx = shots.findIndex(s => s.id === draggedShotId);
      const toIdx   = shots.findIndex(s => s.id === targetId);
      if (fromIdx === -1 || toIdx === -1) return;
      const [moved] = shots.splice(fromIdx, 1);
      shots.splice(toIdx, 0, moved);
      document.querySelectorAll(".drop-target").forEach(el => el.classList.remove("drop-target"));
      draggedShotId = null;
      renumberShots();
      renderTimeline();
    }

    function getTotalDuration() {
      return shots.reduce((sum, s) => sum + (parseFloat(s.duration) || 5), 0);
    }

    function renderRuler(totalSec) {
      const ruler = document.getElementById("tl-ruler");
      if (!ruler) return;
      const trackBody = document.getElementById("track-video");
      const trackW    = trackBody ? trackBody.offsetWidth : 500;
      const pxPerSec  = trackW / (totalSec || 1);
      const step = totalSec <= 30 ? 5 : totalSec <= 120 ? 10 : totalSec <= 300 ? 30 : 60;
      let html = "";
      for (let t = 0; t <= totalSec; t += step) {
        const pct = (t / totalSec) * 100;
        const label = t >= 60 ? `${Math.floor(t/60)}m${t%60>0?t%60+'s':""}` : `${t}s`;
        html += `<div class="tl-ruler-tick" style="left:calc(${pct}% + 54px)">
          <div class="tl-ruler-tick-line"></div>
          <div class="tl-ruler-tick-label">${label}</div>
        </div>`;
      }
      ruler.style.height = "22px";
      ruler.innerHTML = html;
    }

    function renderTracks() {
      const totalSec  = getTotalDuration();
      const videoEl   = document.getElementById("track-video");
      const audioEl   = document.getElementById("track-audio");
      const musicEl   = document.getElementById("track-music");
      if (!videoEl) return;

      videoEl.innerHTML = "";
      audioEl.innerHTML = "";
      if (musicEl) musicEl.innerHTML = `<div class="tl-clip clip-music" style="left:0%;width:100%;opacity:.35">Score Track</div>`;

      let cumSec = 0;
      shots.forEach((s, i) => {
        const dur = parseFloat(s.duration) || 5;
        const leftPct  = (cumSec / totalSec) * 100;
        const widthPct = (dur    / totalSec) * 100;
        const label    = `${s.shot_number || ("SC-"+String(i+1).padStart(3,"0"))} (${dur}s)`;

        videoEl.innerHTML += `<div class="tl-clip clip-video" style="left:${leftPct.toFixed(2)}%;width:${(widthPct - 0.3).toFixed(2)}%;" title="${s.shotDesc||label}">${label}</div>`;
        if (s.fxUrl || s.rawUrl) {
          audioEl.innerHTML += `<div class="tl-clip clip-audio" style="left:${leftPct.toFixed(2)}%;width:${(widthPct - 0.3).toFixed(2)}%;" title="${s.character||"voice"}">${s.character||"VO"}</div>`;
        }
        cumSec += dur;
      });

      renderRuler(totalSec);
    }

    function renderTimeline() {
      if (!shots.length) {
        document.getElementById("track-video").innerHTML = "";
        document.getElementById("track-audio").innerHTML = "";
        shotsList.innerHTML = `<p style="color:var(--text-dim);font-size: 16px;letter-spacing:2px;text-transform:uppercase;">No shots saved yet.</p>`;
        return;
      }

      renderTracks();

      // Shot cards
      shotsList.innerHTML = shots.map((s, index) => `
        <div class="tl-shot-card"
          draggable="true"
          data-id="${s.id}"
          ondragstart="handleDragStart(event, '${s.id}')"
          ondragend="handleDragEnd(event)"
          ondragover="handleDragOver(event)"
          ondragleave="handleDragLeave(event)"
          ondrop="handleDrop(event, '${s.id}')">
          <div class="tl-shot-top">
            <span class="tl-scene-badge" style="cursor:grab;">☰ ${s.shot_number || s.id || "UNKNOWN"}</span>
            <span class="tl-char-tag">${s.character || "Unknown"}</span>
            <span class="tl-preset-tag">${s.preset || s.voice_preset || "No FX"}</span>
            <span class="tl-date">${s.createdAt || ""}</span>
            <label style="font-size: 14px;color:rgba(201,168,76,.4);letter-spacing:1px;margin:0 4px 0 8px;">DUR</label>
            <input type="number" min="1" max="120" step="1" value="${parseFloat(s.duration)||5}"
              style="width:46px;background:rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.2);color:#c9a84c;font-size: 15px;padding:2px 4px;border-radius:2px;font-family:Rajdhani,sans-serif;"
              onchange="updateDuration('${s.id}', this.value)" title="Duration in seconds" />
            <span style="font-size: 14px;color:rgba(201,168,76,.3);margin-left:2px;">s</span>
            <button class="tl-del-btn" title="Move Up"   onclick="moveShot('${s.id}', -1)">↑</button>
            <button class="tl-del-btn" title="Move Down" onclick="moveShot('${s.id}', 1)">↓</button>
            <button class="tl-del-btn" title="Delete"    onclick="deleteShot('${s.id}')">✕</button>
          </div>
          <div style="display:flex;gap:12px;align-items:flex-start;margin-top:6px;">
            <div style="display:flex;flex-direction:column;gap:6px;min-width:220px;width:220px;">
              ${s.videoUrl
                ? `<video controls src="${s.videoUrl}" style="width:100%;border-radius:4px;background:#000;" preload="metadata"></video>`
                : s.imageUrl
                ? `<img src="${s.imageUrl}" style="width:100%;border-radius:4px;object-fit:cover;" />`
                : `<div style="width:100%;height:120px;border-radius:4px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:12px;letter-spacing:1px;">NO MEDIA</div>`}
              <div style="display:flex;gap:6px;">
                ${s.videoUrl ? `<a href="${s.videoUrl}" download style="flex:1;text-align:center;padding:4px 0;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);color:var(--gold);font-family:Rajdhani,sans-serif;font-size:12px;letter-spacing:1px;border-radius:3px;text-decoration:none;">⬇ VIDEO</a>` : ""}
                ${s.imageUrl ? `<a href="${s.imageUrl}" download style="flex:1;text-align:center;padding:4px 0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);font-family:Rajdhani,sans-serif;font-size:12px;letter-spacing:1px;border-radius:3px;text-decoration:none;">⬇ IMG</a>` : ""}
              </div>
            </div>
            <div style="flex:1;min-width:0;">
              ${s.dialogue   ? `<div class="tl-dialogue">"${s.dialogue}"</div>` : ""}
              ${s.shotDesc   ? `<div class="tl-desc">${s.shotDesc}</div>` : ""}
              ${s.shotPrompt ? `<div class="tl-prompt">${s.shotPrompt}</div>` : ""}
              ${s.fxUrl  ? `<audio controls src="${s.fxUrl}"  style="width:100%;margin-top:6px;"></audio>` :
                s.rawUrl ? `<audio controls src="${s.rawUrl}" style="width:100%;margin-top:6px;"></audio>` : ""}
            </div>
          </div>
        </div>
      `).join("");
    }

    async function loadScenes() {
      try {
        const url  = _activeProject ? `${BASE}/scenes?project=${encodeURIComponent(_activeProject)}` : `${BASE}/scenes`;
        const res  = await levFetch(url);
        const data = await res.json();
        if (!data.success) throw new Error("Failed to load scenes");
        shots = data.scenes.map(s => ({
          id:           s.id || String(Date.now()),
          shot_number:  s.shot_number || s.scene_number || s.id || "UNKNOWN",
          character:    s.character || s.voice_character || "None",
          dialogue:     s.dialogue || "",
          shotDesc:     s.shotDesc || s.shot_description || "",
          shotPrompt:   s.shotPrompt || s.shot_prompt || "",
          preset:       s.voice_preset || "",
          rawUrl:       s.rawUrl || "",
          fxUrl:        s.fxUrl || "",
          videoUrl:     s.videoUrl || "",
          imageUrl:     s.imageUrl || s.renderOutputUrl || "",
          duration:     parseFloat(s.duration) || 5,
          createdAt:    s.createdAt || s.saved_at || "",
        }));
        renderTimeline();
        const total = getTotalDuration();
        const totalStr = total >= 60 ? `${Math.floor(total/60)}m ${Math.round(total%60)}s` : `${Math.round(total)}s`;
        setStatus(`${shots.length} shot${shots.length !== 1 ? "s" : ""} loaded · Estimated runtime: ${totalStr}`);
      } catch (e) {
        console.error(e);
        setStatus("Could not load shots.", true);
        renderTimeline();
      }
    }

    async function deleteShot(id) {
      try {
        const res  = await levFetch(`${BASE}/scene/${id}`, { method: "DELETE" });
        const data = await res.json();
        if (!data.success) throw new Error("Delete failed");
        shots = shots.filter(s => s.id !== id);
        renumberShots();
        renderTimeline();
        setStatus("Shot deleted.");
      } catch (e) {
        setStatus("Failed to delete shot.", true);
      }
    }

    function updateDuration(id, val) {
      const shot = shots.find(s => s.id === id);
      if (!shot) return;
      shot.duration = parseFloat(val) || 5;
      const total = getTotalDuration();
      const totalStr = total >= 60 ? `${Math.floor(total/60)}m ${Math.round(total%60)}s` : `${Math.round(total)}s`;
      setStatus(`${shots.length} shot${shots.length !== 1 ? "s" : ""} · Total runtime: ${totalStr}`);
      renderTracks();
    }

    async function saveTimelineOrder() {
      try {
        renumberShots();
        const res  = await levFetch(`${BASE}/timeline/save-order`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ shots })
        });
        if (!res.ok) throw new Error(`Server ${res.status}`);
        const data = await res.json();
        shots = data.shots || shots;
        renderTimeline();
        setStatus(`Order saved. ${shots.length} shots sequenced.`);
      } catch (e) {
        setStatus("Failed to save order.", true);
      }
    }

    async function exportTimeline() {
      const btn = document.querySelector("button.gold[onclick='exportTimeline()']");
      if (btn) { btn.disabled = true; btn.textContent = "Exporting…"; }
      setStatus("Exporting — this may take a minute…");
      try {
        const res  = await levFetch(`${BASE}/video/export-timeline`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ shots, title: "LEVRAM Export", transition: "cut",
                                 transition_dur: 0.3, include_voice: true }),
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.detail || "Export failed");
        const url = (window.LEVRAM_CONFIG?.api || "http://localhost:8000") + data.exportUrl;
        setStatus(`✔ Export done — ${data.clips} clips`);
        const a = document.createElement("a");
        a.href = url; a.download = data.exportUrl.split("/").pop();
        a.click();
      } catch (e) {
        setStatus("Export failed: " + e.message, true);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = "⬇ Export Video"; }
      }
    }

    async function eraseTimeline() {
      if (!confirm("Erase ALL scenes from the timeline? This cannot be undone.")) return;
      try {
        setStatus("Erasing timeline…");
        const res  = await levFetch(`${BASE}/scenes/clear-all`, { method: "DELETE" });
        const data = await res.json();
        shots = [];
        renderTimeline();
        // Reset project dropdown
        const sel = document.getElementById("tl-project-sel");
        if (sel) sel.innerHTML = `<option value="">All Projects</option>`;
        setStatus(`Timeline erased — ${data.deleted || 0} scenes removed.`);
      } catch (e) {
        setStatus("Erase failed: " + e.message, true);
      }
    }

    document.addEventListener("DOMContentLoaded", initProjectFilter);

    // ── Auto-refresh when orchestrator is running ─────────────
    let _orchPollActive = false;

    async function checkOrchJobs() {
      try {
        const res  = await levFetch(`${BASE}/orchestrate/jobs`);
        const data = await res.json();
        const active = (data.jobs || []).filter(j =>
          j.status === "running" || j.status === "planning" || j.status === "starting"
        );
        const banner = document.getElementById("tl-live-banner");
        if (active.length > 0) {
          if (banner) {
            const job = active[0];
            const done  = job.progress || 0;
            const total = job.total    || "?";
            const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
            banner.style.display = "flex";
            banner.innerHTML = `
              <div style="flex:1;">
                <span style="color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-size:11px;">● Live — shots arriving</span>
                <span style="color:rgba(255,255,255,0.4);font-size:10px;margin-left:10px;">${job.step || ""}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="background:rgba(255,255,255,0.1);border-radius:2px;height:3px;width:80px;">
                  <div style="background:var(--gold);height:3px;border-radius:2px;width:${pct}%;transition:width 0.4s;"></div>
                </div>
                <span style="font-size:10px;color:rgba(255,255,255,0.4);">${done}/${total}</span>
                <button onclick="loadScenes()" style="background:transparent;border:1px solid rgba(201,168,76,0.3);color:var(--gold);font-size:10px;letter-spacing:1px;padding:2px 8px;cursor:pointer;border-radius:2px;">Refresh</button>
              </div>`;
          }
          await loadScenes();
          if (!_orchPollActive) {
            _orchPollActive = true;
            setTimeout(checkOrchJobs, 8000);
          }
        } else {
          if (banner) banner.style.display = "none";
          _orchPollActive = false;
        }
      } catch (_) {}
    }

    // Start polling after initial load
    setTimeout(checkOrchJobs, 4000);
  </script>
<script src="themes.js"></script>
</body>
</html>

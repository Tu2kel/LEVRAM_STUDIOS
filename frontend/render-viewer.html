<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LEVRAM Render Viewer</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="render-queue.css" />
  <script src="config.js"></script>
  <script src="themes.js"></script>
</head>
<body>
  <div class="rq-page">
    <div class="rq-page-header">
      <button class="rq-back" onclick="window.location.href='render-queue.html'">← Back to Queue</button>
      <div>
        <div class="rq-page-title">🖼 Render Viewer</div>
        <div class="rq-page-subtitle">Full output review, prompt debugging, and render metadata.</div>
      </div>
    </div>

    <div id="render-viewer-root" class="rv-root">
      Loading render...
    </div>
  </div>

  <script>
    const BASE = window.LEVRAM_CONFIG?.api || "http://127.0.0.1:8000";

    function _engineCost(engine) {
      const costs = {
        full_lock:   "~$0.05 (Seedream + face swap)",
        ws_pulid:    "~$0.03 (WaveSpeed PuLID)",
        ws_flux:     "~$0.012 (WaveSpeed FLUX)",
        ws_seedream: "~$0.025 (WaveSpeed Seedream)",
        dalle3:      "~$0.04 (DALL-E 3)",
        venice_flux: "Free tier / $0.01 Pro",
        novita_photo:"~$0.015 (Novita)",
      };
      return costs[engine] || "unknown";
    }

    async function loadRenderViewer(){
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      const root = document.getElementById("render-viewer-root");

      if (!id) {
        root.innerHTML = "<p>No render id provided.</p>";
        return;
      }

      try {
        const res = await levFetch(`${BASE}/render-queue`);
        const data = await res.json();
        const queue = data.queue || data.jobs || data.items || [];

        const item = queue.find(q =>
          q.id === id ||
          q.renderId === id ||
          q.comfyPromptId === id
        );

        if (!item) {
          root.innerHTML = "<p>Render not found.</p>";
          return;
        }

        root.innerHTML = `
          <div class="rv-layout">
            <div class="rv-image-wrap">
              ${
                item.renderOutputUrl
                  ? `<img class="rv-image" src="${BASE}${item.renderOutputUrl}" alt="Render output">`
                  : `<div class="rv-missing">No image found</div>`
              }
            </div>

            <div class="rv-meta">
              <div class="rv-meta-title">${item.shot?.id || item.shotId || "Render"}</div>

              <div class="rv-row"><strong>Status:</strong> ${item.status || "unknown"}</div>
              <div class="rv-row"><strong>Engine:</strong> <span style="color:#c9a84c;font-weight:700;">${item.engineUsed || "unknown"}</span></div>
              <div class="rv-row"><strong>Est. Cost:</strong> <span style="color:#aaa;">${_engineCost(item.engineUsed)}</span></div>
              <div class="rv-row"><strong>Render ID:</strong> ${item.renderId || "N/A"}</div>
              <div class="rv-row"><strong>Created:</strong> ${item.createdAt || "N/A"}</div>
              <div class="rv-row"><strong>Updated:</strong> ${item.updatedAt || "N/A"}</div>

              <div class="rv-prompt">
                <strong>Prompt Used</strong>
                <p>${item.promptUsed || "Not recorded"}</p>
              </div>

              <div class="rv-actions">
                ${
                  item.renderOutputUrl
                    ? `<a class="rv-btn" href="${BASE}${item.renderOutputUrl}" download>Download</a>`
                    : ""
                }
                <button class="rv-btn" onclick="regenerateViewerRender('${item.id}')">Regenerate</button>
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        root.innerHTML = `<p>Viewer error: ${err.message}</p>`;
      }
    }


    async function regenerateViewerRender(itemId){
      try {
        const res = await levFetch(`${BASE}/render-queue/${itemId}/keyframe`, {
          method: "POST",
        });

        const data = await res.json();

        if (!data.success) {
          alert(data.error || "Regenerate failed");
          return;
        }

        window.location.href = `render-viewer.html?id=${data.item?.renderId || itemId}`;
      } catch (err) {
        alert("Regenerate error: " + err.message);
      }
    }

    window.addEventListener("DOMContentLoaded", loadRenderViewer);
  </script>
<script src="themes.js"></script>
</body>
</html>

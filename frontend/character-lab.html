<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LEVRAM Character Lab</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="character-lab.css" />
</head>
<body>
  <main class="cl-page">

    <header class="cl-header">
      <div class="cl-header-left">
        <div class="cl-logo-badge">⚜</div>
        <div>
          <h1>CHARACTER LAB</h1>
          <p>Imperio Federal Logistics — Cast Registry</p>
        </div>
      </div>
      <div class="cl-header-right">
        <button id="cl-new-btn" onclick="newCharacter()">+ New Character</button>
        <button onclick="window.close()">Close Tab</button>
      </div>
    </header>

    <div id="character-lab-status" class="cl-status" style="display:none;"></div>

    <div class="cl-grid">

      <!-- LEFT — Character Profile Form -->
      <section class="cl-panel cl-form-panel">
        <div class="cl-panel-header">
          <span class="cl-panel-label">Character Profile</span>
          <span id="cl-edit-badge" class="cl-edit-badge" style="display:none;">Editing</span>
        </div>

        <div class="cl-form-body">

          <div class="cl-section">
            <div class="cl-section-label">Identity</div>
            <div class="cl-row-2">
              <input id="character-name" placeholder="Name" />
              <input id="character-gender" placeholder="Gender" />
            </div>
            <input id="character-age" placeholder="Age" />
          </div>

          <div class="cl-divider"></div>

          <div class="cl-section">
            <div class="cl-section-label">Visual</div>
            <textarea id="character-appearance" placeholder="Appearance"></textarea>
            <textarea id="character-wardrobe" placeholder="Wardrobe"></textarea>
          </div>

          <div class="cl-divider"></div>

          <div class="cl-section">
            <div class="cl-section-label">Voice</div>
            <textarea id="character-voice" placeholder="Voice Description"></textarea>
            <select id="character-default-voice">
              <option value="">No Default Voice</option>
            </select>
          </div>

          <div class="cl-divider"></div>

          <div class="cl-section">
            <div class="cl-section-label">Profile</div>
            <textarea id="character-personality" placeholder="Personality"></textarea>
            <textarea id="character-notes" placeholder="Notes"></textarea>
          </div>

        </div>

        <div class="cl-actions">
          <button id="clear-character-btn" type="button" onclick="clearCharacterForm()">Clear</button>
          <button id="save-character-btn" type="button" onclick="saveCharacter()">Save Character</button>
        </div>
      </section>

      <!-- CENTER — Saved Characters Roster -->
      <section class="cl-panel cl-roster-panel">
        <div class="cl-panel-header">
          <span class="cl-panel-label">Saved Characters</span>
        </div>
        <div class="cl-roster-body">
          <div id="character-list"></div>
        </div>
      </section>

      <!-- RIGHT — Visual Test -->
      <section class="cl-panel cl-preview-panel">
        <div class="cl-panel-header">
          <span class="cl-panel-label">Character Visual Test</span>
        </div>
        <div class="cl-preview-body">
          <button id="generate-character-preview-btn" type="button" onclick="generateCharacterPreview()">Generate Character Preview</button>
          <textarea id="character-preview-prompt" placeholder="Generated image prompt will appear here..."></textarea>
          <div id="character-preview-status" class="character-preview-status"></div>
          <img id="character-preview-img" class="character-preview-img" alt="Character preview" style="display:none;" />
        </div>
      </section>

    </div>
  </main>

  <script src="character-lab.js"></script>
</body>
</html>
